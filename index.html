<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Board Game Random Number Table</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="Generator controls">
        <div class="brand-row">
          <div>
            <h1>Random Number Table</h1>
            <p>Build a custom dice-free draw table for your board game reference sheet.</p>
          </div>
        </div>

        <div class="controls-grid">
          <label>
            Rows
            <input id="rowCount" type="number" min="1" max="20" value="4">
          </label>
          <label>
            Columns
            <input id="columnCount" type="number" min="1" max="20" value="4">
          </label>
          <label>
            Minimum number
            <input id="minNumber" type="number" value="1">
          </label>
          <label>
            Maximum number
            <input id="maxNumber" type="number" value="100">
          </label>
          <label>
            Numbers per cell
            <input id="numbersPerCell" type="number" min="1" max="20" value="1">
          </label>
        </div>

        <div class="option-row">
          <label class="check-control">
            <input id="uniqueNumbers" type="checkbox">
            <span>Use each number only once per column</span>
          </label>
          <div class="action-row">
            <button id="generateAll" class="primary-button" type="button">Generate</button>
            <button id="transposeTable" class="ghost-button" type="button">Transpose row and column</button>
            <button id="drawOne" class="secondary-button" type="button">Draw one cell</button>
          </div>
        </div>

        <section class="advanced-settings" aria-labelledby="advancedSettingsTitle">
          <h2 id="advancedSettingsTitle">Advanced table setting</h2>
          <div class="prefix-settings">
            <fieldset class="prefix-fieldset" data-prefix-group="row">
              <legend>Row prefix</legend>
              <div class="prefix-options" role="group" aria-label="Row prefix options">
                <button class="prefix-option" type="button" data-prefix-target="row" data-prefix-value="Student" aria-pressed="false">Student</button>
                <button class="prefix-option" type="button" data-prefix-target="row" data-prefix-value="Group" aria-pressed="false">Group</button>
                <button class="prefix-option" type="button" data-prefix-target="row" data-prefix-value="custom" aria-pressed="false">Custom</button>
              </div>
              <input id="customRowPrefix" class="custom-prefix-input" type="text" placeholder="Custom row prefix" aria-label="Custom row prefix" hidden>
            </fieldset>

            <fieldset class="prefix-fieldset" data-prefix-group="column">
              <legend>Column prefix</legend>
              <div class="prefix-options single-option" role="group" aria-label="Column prefix options">
                <button class="prefix-option" type="button" data-prefix-target="column" data-prefix-value="custom" aria-pressed="false">Custom</button>
              </div>
              <input id="customColumnPrefix" class="custom-prefix-input" type="text" placeholder="Custom column prefix" aria-label="Custom column prefix" hidden>
            </fieldset>

            <fieldset class="prefix-fieldset">
              <legend>Column label presets</legend>
              <div class="prefix-options preset-options" role="group" aria-label="Column label preset options">
                <button class="prefix-option preset-option" type="button" data-preset-value="superfight" aria-pressed="false">Superfight</button>
              </div>
            </fieldset>
          </div>
        </section>

        <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
      </section>

      <section class="table-panel" aria-label="Random number output">
        <div class="table-toolbar">
          <div>
            <h2>Output Table</h2>
            <p>Edit row and column labels directly in the table.</p>
          </div>
          <button id="resetLabels" class="ghost-button" type="button">Reset labels</button>
        </div>

        <div class="table-wrap">
          <table id="numberTable">
            <caption class="sr-only">Generated board game random number table</caption>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
